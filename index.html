<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Accountability">
<meta name="theme-color" content="#15120F">
<title>Accountability</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --clay-dark:#15120F; --surface:#1E1A15; --surface-2:#26211B; --border:#322B22;
    --bisque:#D3AE8C; --bisque-fill:#D3AE8C; --teal:#5FA09C; --teal-fill:#5FA09C;
    --amber:#D3A24A; --porcelain:#F4EEE3; --porcelain-dim:#8C8272; --chore:#8C8272;
    --green:#5FBF6B; --missed:#B5623A; --icon-dim:#7A7060;
    --c-ai:#E0668F; --c-exercise:#E8927C; --c-classes:#D3AE8C; --c-spanish:#D3A24A; --c-reading:#9FC4A8; --c-comms:#5FA09C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--clay-dark);font-family:'Inter',sans-serif;color:var(--porcelain);min-height:100vh;}
  .shell{ display:block; }
  .sidebar{ display:none; }
  .app{ max-width:1040px; margin:0 auto; padding:calc(26px + env(safe-area-inset-top)) 18px 96px; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
  .topbar h1{ font-family:'Fraunces',serif; font-size:24px; margin:0; font-weight:600; }
  .gear{ font-size:19px; cursor:pointer; opacity:.6; padding:4px; color:var(--porcelain-dim); background:none; border:none; }
  .sub{ font-size:11px; color:var(--porcelain-dim); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em; }

  .layout{ display:block; }
  .pane{ display:none; }
  .pane.active{ display:block; }

  .tabbar{ position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--surface); border-top:0.5px solid var(--border); padding:9px 8px calc(16px + env(safe-area-inset-bottom)); max-width:1040px; margin:0 auto; }
  .tab-item{ flex:1; text-align:center; font-size:11px; color:var(--porcelain-dim); cursor:pointer; }
  .tab-item .ic{ font-size:19px; display:block; margin-bottom:1px; }
  .tab-item.active{ color:var(--amber); }

  .date-nav{ display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .date-nav-btn{ width:30px; height:30px; border-radius:9px; background:var(--surface-2); border:none; color:var(--porcelain-dim); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .date-nav-btn:disabled{ opacity:.3; cursor:default; }
  .date-nav-label{ font-size:13px; font-weight:500; color:var(--porcelain); text-align:center; flex:1; }
  .date-nav-tag{ display:block; font-size:9.5px; color:var(--amber); text-transform:uppercase; letter-spacing:.05em; font-weight:600; margin-top:2px; }
  .date-nav-today{ display:block; margin:6px auto 0; background:none; border:none; color:var(--teal); font-size:11.5px; text-decoration:underline; cursor:pointer; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 16px; }
  .chip{ display:inline-flex; align-items:center; gap:5px; background:var(--surface-2); border-radius:999px; padding:6px 12px; font-size:12px; color:var(--bisque); }
  .chip i{ font-size:14px; }
  .chip.rest{ color:var(--porcelain-dim); }
  .segmented{ display:flex; background:var(--surface-2); border-radius:999px; padding:4px; margin-bottom:16px; max-width:340px; }
  .seg{ flex:1; text-align:center; font-size:12.5px; font-weight:500; padding:8px 0; border-radius:999px; cursor:pointer; color:var(--porcelain-dim); }
  .seg.sel-in{ background:var(--bisque); color:#2A1F14; }
  .seg.sel-out{ background:var(--green); color:#0F2A13; }
  .seg.sel-plan{ background:var(--amber); color:#2A1F14; }

  .card{ background:var(--surface); border:0.5px solid var(--border); border-radius:18px; padding:14px; margin-bottom:10px; }
  .field-label{ font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--porcelain-dim); margin:0 0 8px; }
  .choice-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .choice{ flex:1 1 auto; text-align:center; padding:9px 6px 7px; background:var(--surface-2); border-radius:12px; cursor:pointer; color:var(--icon-dim); border:none; font-family:'Inter',sans-serif; }
  .choice i{ font-size:18px; display:block; margin-bottom:2px; }
  .choice .mlbl{ font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--porcelain-dim); display:block; }
  .choice.sel-in{ background:var(--bisque); color:#2A1F14; }
  .choice.sel-in .mlbl{ color:#2A1F14; }

  .cat-card{ background:var(--surface); border:0.5px solid var(--border); border-radius:18px; padding:14px; margin-bottom:10px; }
  .cat-hdr{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .cat-hdr .tile{ width:30px; height:30px; border-radius:9px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--bisque); font-size:16px; flex-shrink:0; }
  .cat-hdr .lbl{ font-weight:500; font-size:13.5px; }
  .topic-list-v{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
  .topic-row-item{ display:flex; align-items:center; justify-content:space-between; background:var(--surface-2); border-radius:12px; padding:9px 12px; }
  .topic-row-name{ font-size:12.5px; flex:1; margin-right:8px; }
  .topic-row-icons{ display:flex; gap:6px; }
  .ticon{ font-size:15px; padding:4px 5px; cursor:pointer; color:var(--icon-dim); transition:.15s; background:none; border:none; }
  .ticon.active{ color:var(--bisque); }
  .ticon.tick{ font-size:16px; }
  .ticon.tick.active{ color:var(--teal); }
  .topic-add-row{ display:flex; gap:6px; }
  .topic-add-input{ flex:1; background:var(--surface-2); border:1px dashed var(--border); border-radius:12px; padding:8px 12px; color:var(--porcelain); font-size:12.5px; font-family:'Inter',sans-serif; }
  .topic-add-btn{ width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:var(--amber); color:#2A1F14; border-radius:10px; font-weight:700; font-size:16px; cursor:pointer; flex-shrink:0; border:none; }
  .item-hdr-line{ display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .item-hdr-line i{ color:var(--bisque); font-size:15px; }

  .chore-card{ background:var(--surface); border:0.5px dashed var(--chore); border-radius:18px; padding:12px 14px; margin-bottom:10px; }
  .simple-toggle-row{ display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
  .simple-toggle-row .txt{ font-size:12.5px; color:var(--porcelain-dim); display:flex; align-items:center; gap:7px; }
  .simple-toggle-row .box{ width:20px; height:20px; border:1.5px solid var(--chore); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--teal); }
  .chore-note-input{ width:100%; background:var(--surface-2); border:1px dashed var(--border); border-radius:10px; padding:8px 11px; color:var(--porcelain); font-size:12px; font-family:'Inter',sans-serif; margin-top:10px; }
  .protein-card{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .protein-card input{ width:64px; text-align:center; background:var(--surface-2); border:0.5px solid var(--border); border-radius:10px; padding:8px; color:var(--porcelain); font-size:14px; }
  .protein-meta{ font-size:11px; color:var(--porcelain-dim); }
  .protein-check{ font-size:20px; color:var(--teal); }
  .protein-check.off{ color:var(--icon-dim); }
  .weight-card{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .weight-card input{ width:64px; text-align:center; background:var(--surface-2); border:0.5px solid var(--border); border-radius:10px; padding:8px; color:var(--porcelain); font-size:14px; }
  .weight-meta{ font-size:11px; color:var(--porcelain-dim); }
  .protein-total-row{ display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
  .protein-total-num{ font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:var(--amber); }
  .protein-total-target{ font-size:11.5px; color:var(--porcelain-dim); flex:1; }
  .protein-bar{ height:7px; border-radius:5px; background:var(--surface-2); overflow:hidden; margin-bottom:10px; }
  .protein-bar-fill{ height:100%; background:var(--amber); border-radius:5px; }
  .protein-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .protein-chip{ display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border-radius:999px; padding:5px 10px; font-size:12px; color:var(--porcelain); }
  .protein-chip i{ cursor:pointer; color:var(--icon-dim); font-size:13px; }
  .protein-add-row{ display:flex; gap:8px; }
  .protein-add-row input{ flex:1; background:var(--surface-2); border:0.5px solid var(--border); border-radius:10px; padding:9px 12px; color:var(--porcelain); font-size:14px; }
  .protein-add-row button{ background:var(--teal); border:none; border-radius:10px; padding:0 18px; color:#0F2A13; font-weight:600; font-size:14px; cursor:pointer; }

  .goal-card .goal-text{ font-size:13px; color:var(--porcelain); margin-bottom:8px; }
  .goal-bar{ height:8px; border-radius:6px; background:var(--surface-2); overflow:hidden; }
  .goal-bar-fill{ height:100%; background:var(--amber); border-radius:6px; }

  .submit{ width:100%; margin-top:6px; padding:13px; border:none; border-radius:999px; font-weight:600; font-size:14px; cursor:pointer; font-family:'Inter',sans-serif; }
  .submit.in{ background:var(--bisque); color:#2A1F14; }
  .submit.out{ background:var(--green); color:#0F2A13; }

  .progress-big{ text-align:center; margin:2px 0 16px; }
  .progress-big .num{ font-family:'Fraunces',serif; font-size:40px; font-weight:700; color:var(--amber); }
  .progress-big .lbl{ font-size:10.5px; color:var(--porcelain-dim); text-transform:uppercase; letter-spacing:.06em; }
  .ghgrid{ display:flex; flex-direction:column; gap:4px; margin:8px auto 10px; max-width:294px; }
  .ghgrid-row{ display:flex; align-items:center; gap:4px; }
  .ghgrid-label{ width:23px; font-size:12px; text-align:center; flex-shrink:0; color:var(--porcelain-dim); }
  .ghgrid-daylabel{ flex:1; text-align:center; font-size:11px; color:var(--porcelain-dim); text-transform:uppercase; letter-spacing:.04em; display:flex; flex-direction:column; }
  .ghgrid-datenum{ font-size:9px; color:var(--icon-dim); }
  .ghcell{ flex:1; aspect-ratio:1; border-radius:5px; cursor:pointer; border:1px solid var(--border); }
  .ghcell.na{ background:var(--surface); border-color:var(--surface); opacity:.4; cursor:default; }
  .ghcell.upcoming{ background:transparent; border-style:dashed; border-color:#4A4337; cursor:default; }
  .ghcell.none{ background:var(--missed); border-color:var(--missed); }
  .ghcell.partial{ background:var(--bisque-fill); border-color:var(--bisque-fill); }
  .ghcell.done{ background:var(--teal-fill); border-color:var(--teal-fill); }
  .ghlegend{ display:flex; align-items:center; gap:12px; font-size:10px; color:var(--porcelain-dim); flex-wrap:wrap; margin-bottom:14px; text-transform:uppercase; letter-spacing:.05em; }
  .ghswatch{ width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:4px; }
  .ghswatch.na{ background:var(--surface); } .ghswatch.none{ background:var(--missed); }
  .ghswatch.partial{ background:var(--bisque-fill); } .ghswatch.done{ background:var(--teal-fill); }

  .plan-cat{ display:flex; gap:10px; align-items:flex-start; }
  .plan-cat .tile{ width:30px; height:30px; border-radius:9px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--bisque); font-size:16px; flex-shrink:0; }
  .plan-cat .body{ flex:1; }
  .plan-cat .lbl{ font-weight:500; font-size:12.5px; margin-bottom:5px; }
  .plan-cat input{ width:100%; background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:8px 12px; color:var(--porcelain); font-size:12px; font-family:'Inter',sans-serif; }
  .chore-tag{ font-size:9.5px; color:var(--chore); text-transform:uppercase; font-weight:600; letter-spacing:.05em; margin-top:4px; }

  .plan-topic-row{ display:flex; flex-direction:column; gap:6px; background:var(--surface-2); border-radius:12px; padding:8px 8px 8px 11px; margin-bottom:6px; }
  .plan-topic-name{ font-size:11.5px; color:var(--porcelain); font-family:'Inter',sans-serif; width:100%; background:none; border:none; padding:2px 0; white-space:pre-wrap; overflow-wrap:break-word; resize:none; overflow:hidden; line-height:1.4; display:block; }
  .plan-topic-chipsrow{ display:flex; align-items:center; justify-content:flex-end; gap:6px; }
  .plan-daychips{ display:flex; gap:3px; }
  .plan-daychip{ width:21px; height:21px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--icon-dim); background:var(--surface); border:none; cursor:pointer; flex-shrink:0; font-family:'Inter',sans-serif; }
  .plan-daychip.on{ font-weight:700; }
  .plan-topic-del{ background:none; border:none; color:var(--icon-dim); font-size:14px; cursor:pointer; padding:2px 0 2px 2px; flex-shrink:0; }
  .plan-date-header{ display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:0 8px 4px 11px; }
  .plan-datenum{ width:21px; text-align:center; font-size:9px; color:var(--icon-dim); flex-shrink:0; }
  .plan-date-delspacer{ width:18px; flex-shrink:0; }
  .plan-progress-tag{ font-size:9px; color:var(--amber); background:var(--surface); border-radius:6px; padding:2px 6px; flex-shrink:0; white-space:nowrap; }

  .cat-progress-row{ display:flex; align-items:center; gap:10px; padding:7px 0; }
  .cat-progress-row + .cat-progress-row{ border-top:0.5px solid var(--border); }
  .cat-progress-body{ flex:1; min-width:0; }
  .cat-progress-top{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--porcelain); }
  .cat-progress-pct{ font-weight:600; color:var(--amber); }
  .cat-progress-sub{ font-size:10.5px; color:var(--porcelain-dim); margin-top:2px; }
  .hours-row{ display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:12.5px; color:var(--porcelain); }
  .hours-row + .hours-row{ border-top:0.5px solid var(--border); }
  .hours-row .val{ font-weight:600; color:var(--amber); }

  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal-overlay.open{ display:flex; }
  .modal-card{ background:var(--surface); border:0.5px solid var(--border); border-radius:20px; padding:20px; max-width:360px; width:100%; }
  .modal-card input{ width:100%; background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:9px 12px; color:var(--porcelain); font-size:13px; margin-bottom:14px; font-family:'Inter',sans-serif; }
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--amber); color:#2A1F14; padding:9px 16px; border-radius:999px; font-size:12.5px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .3s; z-index:60; }
  .toast.show{ opacity:1; }

  .sidebar-title{ font-family:'Fraunces',serif; font-size:16px; color:var(--porcelain); margin:4px 0 18px 10px; }
  .nav-item{ display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px; font-size:12.5px; color:var(--porcelain-dim); cursor:pointer; }
  .nav-item i{ font-size:15px; }
  .nav-item.active{ background:var(--surface-2); color:var(--porcelain); }
  .nav-item.active i{ color:var(--amber); }
  .nav-spacer{ flex:1; }

  @media (min-width: 900px){
    .shell{ display:flex; max-width:1040px; margin:0 auto; min-height:100vh; }
    .sidebar{ display:flex; flex-direction:column; width:190px; flex-shrink:0; padding:24px 12px; border-right:0.5px solid var(--border); }
    .app{ flex:1; max-width:520px; margin:0; padding:26px 32px 40px; }
    .tabbar{ display:none; }
  }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-title">Accountability</div>
    <div class="nav-item active" data-tab="today"><i class="ti ti-home"></i>Today</div>
    <div class="nav-item" data-tab="week"><i class="ti ti-calendar"></i>This Week</div>
    <div class="nav-item" data-tab="analytics"><i class="ti ti-chart-bar"></i>Analytics</div>
    <div class="nav-spacer"></div>
    <div class="nav-item" id="sidebarSettingsBtn"><i class="ti ti-settings"></i>Settings</div>
  </nav>
  <div class="app">
    <div class="topbar">
      <h1 id="greeting">Hello</h1>
      <button class="gear" id="gearBtn"><i class="ti ti-settings"></i></button>
    </div>
    <div class="sub" id="dateSub"></div>

    <div class="layout">
      <div class="pane pane-today active" id="paneToday"></div>
      <div class="pane pane-week" id="paneWeek"></div>
      <div class="pane pane-analytics" id="paneAnalytics"></div>
    </div>
  </div>
</div>

<div class="tabbar">
  <div class="tab-item active" data-tab="today"><span class="ic"><i class="ti ti-home"></i></span>Today</div>
  <div class="tab-item" data-tab="week"><span class="ic"><i class="ti ti-calendar"></i></span>This Week</div>
  <div class="tab-item" data-tab="analytics"><span class="ic"><i class="ti ti-chart-bar"></i></span>Analytics</div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-card">
    <div class="field-label">Obsidian vault name</div>
    <input type="text" id="vaultInput" placeholder="e.g. MyVault">
    <div class="field-label">Protein target (g)</div>
    <input type="number" id="proteinTargetInput">
    <div class="field-label" style="margin-top:14px;">120-day challenge (leave blank for none)</div>
    <input type="text" id="goalTextInput" placeholder="e.g. Build a daily writing habit">
    <div class="field-label" style="margin-top:10px;">Start date</div>
    <input type="date" id="goalStartInput">
    <button class="submit out" id="saveSettingsBtn">Save</button>
    <button class="submit" style="background:var(--surface-2);color:var(--porcelain);" id="closeSettingsBtn">Cancel</button>

    <div class="field-label" style="margin-top:18px;">Sync plan between devices</div>
    <button class="submit" style="background:var(--surface-2);color:var(--porcelain);margin-bottom:10px;" id="copyPlanBtn">Copy plan to clipboard</button>
    <textarea id="loadPlanInput" placeholder="Paste plan here" style="width:100%;min-height:70px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:9px 12px;color:var(--porcelain);font-size:12px;font-family:'Inter',sans-serif;margin-bottom:10px;resize:vertical;"></textarea>
    <button class="submit" style="background:var(--surface-2);color:var(--porcelain);" id="loadPlanBtn">Load plan</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- CONFIG ---------- */
/* ic = emoji kept for the Obsidian markdown export; ti = Tabler icon class for the UI */
const CATS = {
  ai:      { ic:'🧠', ti:'ti-brain',    tint:'var(--c-ai)',       label:'AI Learning' },
  exercise:{ ic:'🏃', ti:'ti-run',      tint:'var(--c-exercise)', label:'Exercise' },
  classes: { ic:'🎨', ti:'ti-palette',  tint:'var(--c-classes)',  label:'Art' },
  spanish: { ic:'🇪🇸', ti:'ti-language', tint:'var(--c-spanish)',  label:'Spanish' },
  reading: { ic:'📚', ti:'ti-book',     tint:'var(--c-reading)',  label:'Reading' },
  comms:   { ic:'🗣️', ti:'ti-message',  tint:'var(--c-comms)',    label:'Communication' },
};
const DEFAULT_DAY_PLAN = { 1:['ai','exercise'], 2:['classes'], 3:['ai','exercise'], 4:['spanish','classes'], 5:['ai','exercise'], 6:['comms','reading'], 0:[] };
const DAY_NAMES = { 1:'Monday', 2:'Tuesday', 3:'Wednesday', 4:'Thursday', 5:'Friday', 6:'Saturday', 0:'Sunday' };
const DEFAULT_TOPICS = {
  ai:[ {id:'ai1',name:'RAG basics',status:'wip'}, {id:'ai2',name:'Fine-tuning',status:'todo'} ],
  spanish:[ {id:'sp1',name:'Ordering food',status:'wip'} ],
  exercise:[ {id:'ex1',name:'Home workout',status:'todo'}, {id:'ex2',name:'Hike',status:'todo'}, {id:'ex3',name:'Walk',status:'todo'}, {id:'ex4',name:'Class',status:'todo'} ],
  classes:[ {id:'cl1',name:'Ceramics',status:'todo'}, {id:'cl2',name:'Singing',status:'todo'} ],
  reading:[ {id:'rd1',name:'Current book',status:'wip'} ],
  comms:[ {id:'cm1',name:'Practice out loud',status:'todo'} ],
};
const STATUS_LABEL = { done:'Complete', wip:'WIP', todo:'No progress' };
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_ABBR = { 1:'M', 2:'Tu', 3:'W', 4:'Th', 5:'F', 6:'Sa', 0:'Su' };
const PLAN_DAY_ORDER = [1,2,3,4,5,6,0];

/* ---------- PERSISTENCE ---------- */
function loadJSON(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

let DAY_LOGS = loadJSON('int_daylogs', {});
let SETTINGS = loadJSON('int_settings', { vaultName:'', proteinTarget:100, goalText:'', goalStart:'' });
let DAY_PLAN = loadJSON('int_dayplan', DEFAULT_DAY_PLAN);

/* Weekly plans: one topics snapshot per week, keyed by that week's Monday.
   Older data (int_topics, a single recurring plan) migrates into the current week. */
let WEEK_PLANS = loadJSON('int_weekplans', {});
/* Categories that always carry forward into a new week; the rest (ai, spanish,
   reading) only carry forward topics not yet marked done. */
const CAT_RECURRING = { exercise:true, classes:true, comms:true, ai:false, spanish:false, reading:false };
const WEEKS_OF_HISTORY = 8;

/* ---------- HELPERS ---------- */
function pad2(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function todayStr(){ return dateKey(new Date()); }
function catsForDate(d){ return DAY_PLAN[d.getDay()] || []; }
function getDayLog(k){ if(!DAY_LOGS[k]) DAY_LOGS[k] = {}; return DAY_LOGS[k]; }
function saveAll(){ saveJSON('int_weekplans', WEEK_PLANS); saveJSON('int_daylogs', DAY_LOGS); }
function greetingWord(){ const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':h<21?'Good evening':'Good night'; }
function weekMonday(d){ const day=d.getDay(); const off = day===0?-6:1-day; const m=new Date(d); m.setDate(d.getDate()+off); return m; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y, m-1, d); }
function weekKeyFor(d){ return dateKey(weekMonday(d)); }

/* ---------- WEEKLY PLANS ---------- */
function lastStatusInWeek(catKey, topicId, wk){
  const monday = parseKey(wk);
  let status = null;
  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const log = DAY_LOGS[dateKey(d)];
    const l = log && log[catKey];
    if(l && l.topicId===topicId && l.status) status = l.status;
  }
  return status;
}
function pruneWeekPlans(){
  const cutoffDate = weekMonday(new Date());
  cutoffDate.setDate(cutoffDate.getDate() - WEEKS_OF_HISTORY*7);
  const cutoff = dateKey(cutoffDate);
  Object.keys(WEEK_PLANS).forEach(k=>{ if(k < cutoff) delete WEEK_PLANS[k]; });
}
function ensureWeekPlan(wk){
  if(WEEK_PLANS[wk]) return WEEK_PLANS[wk];
  const earlier = Object.keys(WEEK_PLANS).filter(k=>k<wk).sort();
  let topics;
  if(earlier.length){
    const srcWk = earlier[earlier.length-1];
    const src = WEEK_PLANS[srcWk].topics;
    topics = {};
    Object.keys(CATS).forEach(cat=>{
      topics[cat] = (src[cat]||[])
        .filter(t=> CAT_RECURRING[cat] || lastStatusInWeek(cat, t.id, srcWk) !== 'done')
        .map(t=>JSON.parse(JSON.stringify(t)));
    });
  } else {
    topics = JSON.parse(JSON.stringify(DEFAULT_TOPICS));
  }
  WEEK_PLANS[wk] = { topics };
  pruneWeekPlans();
  saveJSON('int_weekplans', WEEK_PLANS);
  return WEEK_PLANS[wk];
}
function planTopics(wk){
  const cur = weekKeyFor(new Date());
  if(WEEK_PLANS[wk]) return WEEK_PLANS[wk].topics;
  if(wk >= cur) return ensureWeekPlan(wk).topics;
  /* Past week with no saved plan: it's genuinely empty — never borrow another week's plan */
  return {};
}
/* Migrate the old single recurring plan (int_topics) into the current week once */
if(Object.keys(WEEK_PLANS).length===0){
  WEEK_PLANS[weekKeyFor(new Date())] = { topics: loadJSON('int_topics', DEFAULT_TOPICS) };
  saveJSON('int_weekplans', WEEK_PLANS);
}

/* ---------- STATE ---------- */
let tab='today', mode='checkout', weekView='progress';
let selectedCell=null;
let viewDate=new Date();
let planWeekOffset=0;
let planUnlocked=false;
function planViewWeekKey(){
  const m = weekMonday(new Date());
  m.setDate(m.getDate() + planWeekOffset*7);
  return dateKey(m);
}
function planIsEditable(){ return planWeekOffset >= 0 || planUnlocked; }
function shiftPlanWeek(dir){
  const next = planWeekOffset + dir;
  if(next < -WEEKS_OF_HISTORY || next > 1) return;
  planWeekOffset = next; planUnlocked = false; render();
}
function unlockPastWeek(){
  const wk = planViewWeekKey();
  /* A past week without its own saved plan borrows the nearest one for display;
     give it a real copy before editing so the source week is never mutated. */
  if(!WEEK_PLANS[wk]){
    WEEK_PLANS[wk] = { topics: JSON.parse(JSON.stringify(planTopics(wk))) };
    saveJSON('int_weekplans', WEEK_PLANS);
  }
  planUnlocked = true; render();
}
function viewDateKey(){ return dateKey(viewDate); }
function shiftViewDate(days){
  const d=new Date(viewDate); d.setDate(d.getDate()+days);
  if(dateKey(d) > todayStr()) return;
  viewDate = d; render();
}
function jumpToToday(){ viewDate = new Date(); render(); }

/* ---------- CORE ACTIONS ---------- */
function logTopicStatus(catKey, topicId, status){
  const topics = planTopics(weekKeyFor(viewDate));
  const topic = (topics[catKey]||[]).find(t=>t.id===topicId);
  if(!topic) return;
  const log = getDayLog(viewDateKey());
  const prev = log[catKey] || {};
  log[catKey] = { topicId, topicName: topic.name, status, hours: prev.hours, progress: prev.progress };
  saveAll();
  render();
}
function setCatHours(catKey, hours){
  const log = getDayLog(viewDateKey());
  log[catKey] = log[catKey] || {};
  log[catKey].hours = hours;
  saveAll();
}
function addTopic(catKey, name, wk){
  wk = wk || planViewWeekKey();
  name = name.trim(); if(!name) return;
  const topics = planTopics(wk);
  topics[catKey] = topics[catKey] || [];
  topics[catKey].push({ id: catKey+Date.now(), name, days:[] });
  saveAll(); render();
}
function setMood(m){ getDayLog(viewDateKey()).mood = m; saveAll(); render(); }
function proteinEntries(log){
  if(log.proteinEntries) return log.proteinEntries;
  return log.protein ? [Number(log.protein)] : [];
}
function proteinTotal(log){ return proteinEntries(log).reduce((a,b)=>a+b,0); }
function addProteinEntry(v){
  const log = getDayLog(viewDateKey());
  const entries = proteinEntries(log);
  entries.push(v);
  log.proteinEntries = entries;
  delete log.protein;
  saveAll(); render();
}
function removeProteinEntry(i){
  const log = getDayLog(viewDateKey());
  const entries = proteinEntries(log);
  entries.splice(i,1);
  log.proteinEntries = entries;
  saveAll(); render();
}
function setWeight(v){ getDayLog(viewDateKey()).weight = v; saveAll(); }
function toggleChores(){ const log=getDayLog(viewDateKey()); log.chores = !log.chores; saveAll(); render(); }
function setChoresNote(v){ getDayLog(viewDateKey()).choresNote = v; saveAll(); }
function topicsForToday(catKey, date){
  const dow = date.getDay();
  const topics = planTopics(weekKeyFor(date));
  return (topics[catKey]||[]).filter(t => !t.days || t.days.length===0 || t.days.includes(dow));
}
function toggleTopicDay(catKey, topicId, dow){
  if(!planIsEditable()) return;
  const topics = planTopics(planViewWeekKey());
  const topic = (topics[catKey]||[]).find(t=>t.id===topicId);
  if(!topic) return;
  topic.days = topic.days || [];
  const idx = topic.days.indexOf(dow);
  if(idx===-1){
    topic.days.push(dow);
    DAY_PLAN[dow] = DAY_PLAN[dow] || [];
    if(!DAY_PLAN[dow].includes(catKey)) DAY_PLAN[dow].push(catKey);
    saveJSON('int_dayplan', DAY_PLAN);
  } else {
    topic.days.splice(idx,1);
  }
  saveAll(); render();
}
function renameTopic(catKey, topicId, name){
  if(!planIsEditable()) return;
  const topics = planTopics(planViewWeekKey());
  const topic = (topics[catKey]||[]).find(t=>t.id===topicId);
  if(!topic) return;
  topic.name = name;
  saveAll();
}
function setTopicProgress(catKey, topicId, progress){
  const topics = planTopics(weekKeyFor(viewDate));
  const topic = (topics[catKey]||[]).find(t=>t.id===topicId);
  if(topic) topic.progress = progress;
  const log = getDayLog(viewDateKey());
  if(log[catKey] && log[catKey].topicId===topicId) log[catKey].progress = progress;
  saveAll();
}
function removeTopic(catKey, topicId){
  if(!planIsEditable()) return;
  const wk = planViewWeekKey();
  const topics = planTopics(wk);
  topics[catKey] = (topics[catKey]||[]).filter(t=>t.id!==topicId);
  /* Clear that topic's logs only within this week — the same topic may live on
     in other weeks' plans (copied forward), and their history must stay intact */
  const monday = parseKey(wk);
  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const log = DAY_LOGS[dateKey(d)];
    if(log && log[catKey] && log[catKey].topicId===topicId) delete log[catKey];
  }
  saveAll(); render();
}
/* ---------- GRID / PROGRESS ---------- */
function computeCell(catKey, date){
  const dow = date.getDay();
  const dStr = dateKey(date);
  const tStr = todayStr();
  const scheduled = catKey==='chores' ? true : (DAY_PLAN[dow]||[]).includes(catKey);
  if(!scheduled) return 'na';
  const isFuture = dStr > tStr;
  const isToday = dStr === tStr;
  const log = DAY_LOGS[dStr];
  if(catKey==='chores'){
    if(log && typeof log.chores === 'boolean') return log.chores ? 'done' : (isFuture||isToday?'upcoming':'none');
    return isFuture||isToday ? 'upcoming' : 'none';
  }
  const catLog = log && log[catKey];
  if(catLog){
    if(catLog.status==='done') return 'done';
    if(catLog.status==='wip') return 'partial';
  }
  return isFuture||isToday ? 'upcoming' : 'none';
}

  const start = new Date(SETTINGS.goalStart+'T00:00:00');

}

/* ---------- SHARED STATS HELPERS ---------- */
function catStatsForDates(catKey, dates){
  let d=0, p=0, m=0, s=0;
  dates.forEach(dt=>{
    const st = computeCell(catKey, dt);
    if(st==='done'){d++;s++;} else if(st==='partial'){p++;s++;} else if(st==='none'){m++;s++;}
  });
  return { done:d, partial:p, missed:m, scheduled:s, pct: s ? Math.round(((d+p*0.5)/s)*100) : null };
}
function datesInRange(start, end){
  const dates=[]; const d=new Date(start);
  while(d<=end){ dates.push(new Date(d)); d.setDate(d.getDate()+1); }
  return dates;
}
function hoursBreakdown(catKeys, dates){
  const totals = {};
  dates.forEach(d=>{
    const log = DAY_LOGS[dateKey(d)];
    if(!log) return;
    catKeys.forEach(ck=>{
      const l = log[ck];
      const h = l && Number(l.hours);
      if(h>0) totals[l.topicName] = (totals[l.topicName]||0) + h;
    });
  });
  return totals;
}
function proteinStatsForDates(dates){
  let sum=0, count=0, met=0;
  dates.forEach(d=>{
    const log = DAY_LOGS[dateKey(d)];
    if(!log) return;
    const total = proteinTotal(log);
    if(total>0){ sum+=total; count++; if(total>=SETTINGS.proteinTarget) met++; }
  });
  const avgDaily = count ? Math.round(sum/count) : 0;
  return { avgDaily, avgWeekly: Math.round(avgDaily*7), daysLogged:count, daysMet:met };
}
function weightStatsForDates(dates){
  const entries = [];
  dates.forEach(d=>{
    const log = DAY_LOGS[dateKey(d)];
    if(log && Number(log.weight)>0) entries.push(Number(log.weight));
  });
  if(!entries.length) return { latest:0, change:0, daysLogged:0 };
  const latest = entries[entries.length-1];
  const change = Math.round((latest - entries[0])*10)/10;
  return { latest, change, daysLogged: entries.length };
}

function renderProgress(){

  rows.forEach(r=>{ rowStats[r] = catStatsForDates(r, dates); });
  let done=0, partial=0, missed=0, scheduled=0;
  rows.forEach(r=>{ done+=rowStats[r].done; partial+=rowStats[r].partial; missed+=rowStats[r].missed; scheduled+=rowStats[r].scheduled; });

  return `

    <div class="ghlegend"><span><span class="ghswatch na"></span>Not planned</span> <span><span class="ghswatch none"></span>Missed</span> <span><span class="ghswatch partial"></span>Partial</span> <span><span class="ghswatch done"></span>Done</span></div>
    <div class="card" style="margin-bottom:14px;">
      <div class="field-label" style="margin:0 0 10px;">By category this week</div>
      ${rows.map(r=>{
        const st = rowStats[r];

        const tint = r==='chores' ? 'var(--chore)' : CATS[r].tint;

}

function renderCellDetail(){

  const { cat, dStr } = selectedCell;

  const d = new Date(dStr);
  const dateLabel = d.toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'short'});
  if(cat==='chores'){
    const dayLog = DAY_LOGS[dStr];
    const done = dayLog && dayLog.chores;
    const note = dayLog && dayLog.choresNote;
    return `<div class="field-label" style="margin:0 0 4px;">${label} · ${dateLabel}</div><div style="font-size:12.5px;">${done?'Done ✓':'Not logged'}${note?' — '+note:''}</div>`;
  }
  return `
    <div class="field-label" style="margin:0 0 4px;">${label} · ${dateLabel}</div>
    <div style="font-size:12.5px;">${log && log.status ? `${STATUS_LABEL[log.status]} — ${log.topicName}${log.hours?` (${log.hours}h)`:''}` : 'Not logged'}</div>
  `;
}

function renderPlanTopicRow(catKey, cat, topic, editable){
  const days = topic.days || [];
  const progressTag = catKey==='reading' && topic.progress ? `<span class="plan-progress-tag">${topic.progress}</span>` : '';
  return `
    <div class="plan-topic-row">
      <textarea class="plan-topic-name" rows="1" data-topicrename="${catKey}:${topic.id}" ${editable?'':'readonly'}>${topic.name}</textarea>
      <div class="plan-topic-chipsrow">
        ${progressTag}
        <div class="plan-daychips">
          ${PLAN_DAY_ORDER.map(dow=>`<button class="plan-daychip ${days.includes(dow)?'on':''}" ${editable?`data-topicday="${catKey}:${topic.id}:${dow}"`:''} style="${days.includes(dow)?`background:${cat.tint};color:#2A1F14;`:''}">${DAY_ABBR[dow]}</button>`).join('')}
        </div>
        ${editable?`<button class="plan-topic-del" data-topicdel="${catKey}:${topic.id}"><i class="ti ti-x"></i></button>`:''}
      </div>
    </div>`;
}
function renderPlanDateHeader(monday){
  const nums = PLAN_DAY_ORDER.map(dow=>{
    const dayIndex = dow===0 ? 6 : dow-1;
    const d = new Date(monday); d.setDate(monday.getDate()+dayIndex);
    return d.getDate();
  });
  return `
    <div class="plan-date-header">
      <div class="plan-daychips">
        ${nums.map(n=>`<span class="plan-datenum">${n}</span>`).join('')}
      </div>
      <span class="plan-date-delspacer"></span>
    </div>`;
}
function planWeekLabel(){
  const monday = parseKey(planViewWeekKey());
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const range = `${monday.getDate()} ${MONTH_SHORT[monday.getMonth()]} – ${sunday.getDate()} ${MONTH_SHORT[sunday.getMonth()]}`;
  if(planWeekOffset===0) return `This week · ${range}`;
  if(planWeekOffset===1) return `Next week · ${range}`;
  return `${range}`;
}
function renderPlan(){
  const wk = planViewWeekKey();
  const topics = planTopics(wk);
  const editable = planIsEditable();
  const monday = parseKey(wk);
  return `
    <div class="date-nav" style="margin-bottom:10px;">
      <button class="date-nav-btn" id="planPrev" ${planWeekOffset<=-WEEKS_OF_HISTORY?'disabled':''}><i class="ti ti-chevron-left"></i></button>
      <div class="date-nav-label">${planWeekLabel()}${planWeekOffset<0?`<span class="date-nav-tag">${planUnlocked?'past week — editing unlocked':'past week — view only'}</span>`:''}</div>
      <button class="date-nav-btn" id="planNext" ${planWeekOffset>=1?'disabled':''}><i class="ti ti-chevron-right"></i></button>
    </div>
    ${planWeekOffset<0 && !planUnlocked ? `<button class="date-nav-today" id="planUnlockBtn">Emergency edit — unlock this week</button>` : ''}
    <div class="sub" style="text-transform:none;letter-spacing:0;">${editable ? 'Topics — tap a day letter to pin a topic to that day. Leave unpinned to show it every day.' : 'What this week’s plan looked like.'}</div>
    ${Object.entries(CATS).map(([k,c], idx)=>`
      <div class="card">
        <div class="cat-hdr"><span class="tile" style="color:${c.tint};"><i class="ti ${c.ti}"></i></span><span class="lbl">${c.label}</span></div>
        ${idx===0 ? renderPlanDateHeader(monday) : ''}
        ${(topics[k]||[]).map(t=>renderPlanTopicRow(k,c,t,editable)).join('')}
        ${(topics[k]||[]).length===0 ? `<div class="sub" style="margin:0 0 8px;text-transform:none;letter-spacing:0;">No topics${editable?' yet — add one below':''}.</div>` : ''}
        ${editable?`
        <div class="topic-add-row">
          <input type="text" class="topic-add-input" placeholder="Add a topic…" data-addinput="${k}">
          <button class="topic-add-btn" data-addbtn="${k}">+</button>
        </div>`:''}
      </div>`).join('')}
    <div class="card plan-cat">
      <span class="tile"><i class="ti ti-wash"></i></span>
      <div class="body"><div class="lbl">Household chores</div><div class="chore-tag">Simple checklist — no weekly intention needed</div></div>
    </div>
  `;
}

/* ---------- RENDER: ANALYTICS ---------- */
function goalRangeBounds(){
  let start;
  if(SETTINGS.goalStart){
    start = new Date(SETTINGS.goalStart+'T00:00:00');
  } else {
    start = new Date(); start.setHours(0,0,0,0); start.setDate(start.getDate()-119);
  }
  const capEnd = new Date(start); capEnd.setDate(capEnd.getDate()+119);
  const today = new Date(); today.setHours(0,0,0,0);
  const end = capEnd < today ? capEnd : today;
  const dayNum = Math.floor((end-start)/86400000)+1;
  const label = SETTINGS.goalStart ? `Day 1–${dayNum} of 120` : `Last ${dayNum} days`;
  return { start, end, label };
}
function renderAnalytics(){
  const { start, end, label } = goalRangeBounds();
  const dates = datesInRange(start, end);
  const rows = [...Object.keys(CATS), 'chores'];
  const rowStats = {}; rows.forEach(r=>{ rowStats[r] = catStatsForDates(r, dates); });
  const hours = hoursBreakdown(['ai','classes'], dates);
  const protein = proteinStatsForDates(dates);
  const weight = weightStatsForDates(dates);
  return `
    <div class="pane-title" style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:4px;">Analytics</div>
    <div class="sub" style="margin-bottom:14px;">${label}${SETTINGS.goalText ? ` — ${SETTINGS.goalText}` : ''}</div>
    <div class="card" style="margin-bottom:10px;">
      <div class="field-label" style="margin:0 0 10px;">By category</div>
      ${rows.map(r=>{
        const st = rowStats[r];
        const lbl = r==='chores' ? 'Household chores' : CATS[r].label;
        const tint = r==='chores' ? 'var(--chore)' : CATS[r].tint;
        const ti = r==='chores' ? 'ti-wash' : CATS[r].ti;
        return `
          <div class="cat-progress-row">
            <span class="tile" style="color:${tint};width:26px;height:26px;font-size:14px;"><i class="ti ${ti}"></i></span>
            <div class="cat-progress-body">
              <div class="cat-progress-top"><span>${lbl}</span><span class="cat-progress-pct">${st.pct===null?'—':st.pct+'%'}</span></div>
              <div class="cat-progress-sub">${st.scheduled===0?'Not scheduled':`${st.done} done · ${st.partial} partial · ${st.missed} missed`}</div>
            </div>
          </div>`;
      }).join('')}
    </div>
    <div class="card" style="margin-bottom:10px;">
      <div class="field-label" style="margin:0 0 8px;">Practice hours — AI &amp; Art</div>
      ${Object.keys(hours).length ? Object.entries(hours).map(([name,h])=>`
        <div class="hours-row"><span>${name}</span><span class="val">${h}h</span></div>
      `).join('') : `<div class="sub" style="margin:0;text-transform:none;letter-spacing:0;">No hours logged yet this period.</div>`}
    </div>
    <div class="card">
      <div class="field-label" style="margin:0 0 8px;">Protein</div>
      <div class="hours-row"><span>Average per day</span><span class="val">${protein.avgDaily}g</span></div>
      <div class="hours-row"><span>Average per week</span><span class="val">${protein.avgWeekly}g</span></div>
      <div class="cat-progress-sub" style="margin-top:6px;">${protein.daysMet} of ${protein.daysLogged} logged days hit your ${SETTINGS.proteinTarget}g target</div>
    </div>
    <div class="card">
      <div class="field-label" style="margin:0 0 8px;">Weight</div>
      ${weight.daysLogged ? `
        <div class="hours-row"><span>Latest</span><span class="val">${weight.latest}kg</span></div>
        <div class="cat-progress-sub" style="margin-top:6px;">${weight.change>0?'+':''}${weight.change}kg over this period · ${weight.daysLogged} days logged</div>
      ` : `<div class="sub" style="margin:0;text-transform:none;letter-spacing:0;">No weight logged yet this period.</div>`}
    </div>
  `;
}

/* ---------- MAIN RENDER ---------- */
function render(){
  document.getElementById('greeting').textContent = greetingWord() + ', Sudha!';
  document.getElementById('dateSub').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'});
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.nav-item[data-tab]').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  const paneId = tab==='today' ? 'paneToday' : tab==='week' ? 'paneWeek' : 'paneAnalytics';
  document.getElementById(paneId).classList.add('active');
  document.getElementById('paneToday').innerHTML = renderToday();
  document.getElementById('paneWeek').innerHTML = renderWeek();
  document.getElementById('paneAnalytics').innerHTML = renderAnalytics();
  attach();
}

/* ---------- OBSIDIAN EXPORT ---------- */
function buildDayMarkdown(dStr){
  const log = DAY_LOGS[dStr] || {};
  const cats = catsForDate(new Date(dStr));
  let md = `## Life Log — ${dStr}\n\n`;
  cats.forEach(k=>{
    const l = log[k];
    md += `### ${CATS[k].ic} ${CATS[k].label}${l && l.topicName ? ' — '+l.topicName : ''}\n`;
    md += `Status: ${l && l.status ? STATUS_LABEL[l.status] : 'Not logged'}${l && l.hours ? ` (${l.hours}h)` : ''}${l && l.progress ? ` — progress: ${l.progress}` : ''}\n\n`;
  });
  const pEntries = proteinEntries(log);
  md += `Protein: ${proteinTotal(log)}g / ${SETTINGS.proteinTarget}g target${pEntries.length>1 ? ` (${pEntries.join('g + ')}g)` : ''}\n`;
  if(log.weight) md += `Weight: ${log.weight}kg\n`;
  md += `Chores: ${log.chores ? 'Done' : 'Not done'}${log.choresNote ? ' — '+log.choresNote : ''}\n`;
  md += `Mood: ${log.mood || '—'}\n`;
  return md;
}
function obsidianFilepath(dStr){
  const d = new Date(dStr);
  const year = d.getFullYear();
  const mon = MONTH_SHORT[d.getMonth()];
  const yy = String(year).slice(2);
  const dd = pad2(d.getDate());
  return `0 Sudhas world/1. personal journal/accountability/${year}/${mon} ${yy}/${dd} ${mon}`;
}
function saveToObsidian(){
  if(!SETTINGS.vaultName){ openSettings(); toast('Add your vault name first'); return; }
  const dStr = viewDateKey();
  const filepath = obsidianFilepath(dStr);
  const content = buildDayMarkdown(dStr);
  const url = `obsidian://advanced-uri?vault=${encodeURIComponent(SETTINGS.vaultName)}&filepath=${encodeURIComponent(filepath)}&data=${encodeURIComponent(content)}&mode=overwrite`;
  window.location.href = url;
  toast('Sent to Obsidian');
}

/* ---------- SETTINGS ---------- */
function openSettings(){
  document.getElementById('vaultInput').value = SETTINGS.vaultName;
  document.getElementById('proteinTargetInput').value = SETTINGS.proteinTarget;
  document.getElementById('goalTextInput').value = SETTINGS.goalText || '';
  document.getElementById('goalStartInput').value = SETTINGS.goalStart || todayStr();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings(){
  SETTINGS.vaultName = document.getElementById('vaultInput').value.trim();
  SETTINGS.proteinTarget = Number(document.getElementById('proteinTargetInput').value) || 100;
  const newGoalText = document.getElementById('goalTextInput').value.trim();
  const newGoalStart = document.getElementById('goalStartInput').value || todayStr();
  let toastMsg = 'Settings saved';
  if(newGoalStart && !newGoalText){
    toastMsg = 'Add a name for your 120-day challenge to start tracking it';
  } else {
    const goalChanged = newGoalText !== (SETTINGS.goalText || '') || newGoalStart !== (SETTINGS.goalStart || '');
    const hadExistingGoal = !!SETTINGS.goalText;
    if(goalChanged){
      const ok = !hadExistingGoal || confirm('This will change your 120-day challenge (text and/or start date). Your progress will be recalculated from the new start date. Continue?');
      if(ok){
        SETTINGS.goalText = newGoalText;
        SETTINGS.goalStart = newGoalText ? newGoalStart : '';
      }
    }
  }
  saveJSON('int_settings', SETTINGS);
  closeSettings(); toast(toastMsg); render();
}
async function copyPlanToClipboard(){
  const payload = { weekPlans: WEEK_PLANS, dayPlan: DAY_PLAN, proteinTarget: SETTINGS.proteinTarget };
  const text = JSON.stringify(payload);
  try{
    await navigator.clipboard.writeText(text);
    toast('Plan copied — paste it on your other device');
  }catch(e){
    document.getElementById('loadPlanInput').value = text;
    toast('Copy this text manually');
  }
}
function loadPlanFromInput(){
  const raw = document.getElementById('loadPlanInput').value.trim();
  if(!raw){ toast('Paste a plan first'); return; }
  let payload;
  try{ payload = JSON.parse(raw); }catch(e){ toast('That doesn\'t look like a valid plan'); return; }
  if(!(payload.weekPlans || payload.topics) || !payload.dayPlan){ toast('That doesn\'t look like a valid plan'); return; }
  if(payload.weekPlans){
    WEEK_PLANS = payload.weekPlans;
  } else {
    /* Plan copied from an older version of the app: load its single topic list into the current week */
    WEEK_PLANS[weekKeyFor(new Date())] = { topics: payload.topics };
  }
  DAY_PLAN = payload.dayPlan;
  if(payload.proteinTarget) SETTINGS.proteinTarget = payload.proteinTarget;
  saveAll();
  saveJSON('int_dayplan', DAY_PLAN);
  saveJSON('int_settings', SETTINGS);
  document.getElementById('loadPlanInput').value = '';
  closeSettings(); toast('Plan loaded'); render();
}

/* ---------- EVENTS ---------- */
function attach(){
  document.querySelectorAll('[data-tab]').forEach(t=>t.addEventListener('click',()=>{tab=t.dataset.tab; render();}));
  document.querySelectorAll('[data-mode]').forEach(t=>t.addEventListener('click',()=>{mode=t.dataset.mode; render();}));
  document.querySelectorAll('[data-week]').forEach(t=>t.addEventListener('click',()=>{weekView=t.dataset.week; render();}));
  document.querySelectorAll('[data-mood]').forEach(t=>t.addEventListener('click',()=>setMood(t.dataset.mood)));
  document.querySelectorAll('[data-log]').forEach(t=>t.addEventListener('click',()=>{
    const [cat,id,status] = t.dataset.log.split(':'); logTopicStatus(cat,id,status);
  }));
  function addTargetWeek(el){ return el.closest('#paneToday') ? weekKeyFor(viewDate) : planViewWeekKey(); }
  document.querySelectorAll('[data-addbtn]').forEach(t=>t.addEventListener('click',()=>{
    const cat=t.dataset.addbtn; const input=t.closest('.topic-add-row').querySelector('input');
    addTopic(cat, input.value, addTargetWeek(t)); input.value='';
  }));
  document.querySelectorAll('[data-addinput]').forEach(el=>el.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){ e.preventDefault(); addTopic(el.dataset.addinput, el.value, addTargetWeek(el)); el.value=''; }
  }));
  document.querySelectorAll('[data-progress]').forEach(el=>el.addEventListener('input',(e)=>{
    const [cat,id] = el.dataset.progress.split(':'); setTopicProgress(cat, id, e.target.value);
  }));
  const pp = document.getElementById('planPrev'); if(pp) pp.addEventListener('click', ()=>shiftPlanWeek(-1));
  const pn = document.getElementById('planNext'); if(pn) pn.addEventListener('click', ()=>shiftPlanWeek(1));
  const pu = document.getElementById('planUnlockBtn'); if(pu) pu.addEventListener('click', unlockPastWeek);
  document.querySelectorAll('[data-topicday]').forEach(el=>el.addEventListener('click',()=>{
    const [cat,id,dow] = el.dataset.topicday.split(':'); toggleTopicDay(cat, id, Number(dow));
  }));
  document.querySelectorAll('[data-topicdel]').forEach(el=>el.addEventListener('click',()=>{
    const [cat,id] = el.dataset.topicdel.split(':'); removeTopic(cat, id);
  }));
  function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
  document.querySelectorAll('.plan-topic-name').forEach(autoResize);
  document.querySelectorAll('[data-topicrename]').forEach(el=>el.addEventListener('input',(e)=>{
    autoResize(el);
    const [cat,id] = el.dataset.topicrename.split(':'); renameTopic(cat, id, e.target.value);
  }));
  document.querySelectorAll('[data-cell]').forEach(c=>{
    if(c.classList.contains('na')) return;
    c.addEventListener('click',()=>{
      const [cat,dStr] = c.dataset.cell.split('|');
      selectedCell = { cat, dStr };
      const detail = document.getElementById('cellDetail');
      if(detail) detail.innerHTML = renderCellDetail();
    });
  });
  const pab = document.getElementById('proteinAddBtn');
  const pai = document.getElementById('proteinAddInput');
  if(pab && pai){
    const doAdd = ()=>{ const v = Number(pai.value); if(v>0) addProteinEntry(v); };
    pab.addEventListener('click', doAdd);
    pai.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doAdd(); });
  }
  document.querySelectorAll('[data-protein-del]').forEach(el=>{
    el.addEventListener('click', ()=>removeProteinEntry(Number(el.dataset.proteinDel)));
  });
  const wi = document.getElementById('weightInput');
  if(wi) wi.addEventListener('input',(e)=>setWeight(Number(e.target.value)||0));
  const ct = document.getElementById('choreToggle');
  if(ct) ct.addEventListener('click', toggleChores);
  const cni = document.getElementById('choresNoteInput');
  if(cni) cni.addEventListener('input', (e)=>setChoresNote(e.target.value));
  document.querySelectorAll('[data-cathours]').forEach(el=>el.addEventListener('input',(e)=>setCatHours(el.dataset.cathours, e.target.value)));
  const dp = document.getElementById('datePrev'); if(dp) dp.addEventListener('click', ()=>shiftViewDate(-1));
  const dn = document.getElementById('dateNext'); if(dn) dn.addEventListener('click', ()=>shiftViewDate(1));
  const dj = document.getElementById('dateJumpToday'); if(dj) dj.addEventListener('click', jumpToToday);
  const ob = document.getElementById('saveObsidianBtn');
  if(ob) ob.addEventListener('click', saveToObsidian);
  const gear = document.getElementById('gearBtn');
  if(gear) gear.addEventListener('click', openSettings);
  const sidebarGear = document.getElementById('sidebarSettingsBtn');
  if(sidebarGear) sidebarGear.addEventListener('click', openSettings);
  const ss = document.getElementById('saveSettingsBtn'); if(ss) ss.addEventListener('click', saveSettings);
  const cs = document.getElementById('closeSettingsBtn'); if(cs) cs.addEventListener('click', closeSettings);
  const cp = document.getElementById('copyPlanBtn'); if(cp) cp.addEventListener('click', copyPlanToClipboard);
  const lp = document.getElementById('loadPlanBtn'); if(lp) lp.addEventListener('click', loadPlanFromInput);
}

render();

/* ---------- SERVICE WORKER ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
